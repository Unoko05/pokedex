<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  img-src 'self' data: https://cdn.jsdelivr.net https://raw.githubusercontent.com https://fastly.jsdelivr.net https://gcore.jsdelivr.net;
  connect-src https://pokeapi.co;
  base-uri 'none';
  form-action 'none';
  frame-ancestors 'none';
">
<title>포켓몬 타입 도감</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e14;
    --panel: #15171f;
    --panel-2: #1d2030;
    --screen: #9bbc0f;
    --screen-darkest: #0f380f;
    --red: #e63946;
    --red-dark: #a72836;
    --gold: #ffb703;
    --text: #e8eaf0;
    --muted: #8f93a6;
    --border: #2a2e44;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    background-image:
      radial-gradient(circle at 10% 0%, rgba(230,57,70,0.08), transparent 50%),
      radial-gradient(circle at 90% 100%, rgba(255,183,3,0.06), transparent 50%);
    padding: 16px;
    padding-bottom: 60px;
  }
  .device {
    max-width: 480px;
    margin: 0 auto;
    background: linear-gradient(160deg, var(--red) 0%, var(--red-dark) 100%);
    border-radius: 18px 18px 24px 24px;
    padding: 18px 16px 20px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.15),
      inset 0 -3px 0 rgba(0,0,0,0.25),
      0 20px 50px rgba(0,0,0,0.5);
    position: relative;
  }
  .device::before {
    content: '';
    position: absolute;
    top: 14px; left: 14px;
    width: 28px; height: 28px;
    background: radial-gradient(circle at 35% 35%, #6cb4ff 0%, #1d6fbf 60%, #0a3a7a 100%);
    border-radius: 50%;
    box-shadow:
      inset 0 -2px 4px rgba(0,0,0,0.4),
      inset 0 2px 2px rgba(255,255,255,0.4),
      0 0 8px rgba(108,180,255,0.4);
  }
  .header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-left: 50px;
    height: 28px;
  }
  .led { width: 10px; height: 10px; border-radius: 50%; background: #5a0e0e; box-shadow: inset 0 -1px 1px rgba(0,0,0,0.5); }
  .led.r { background: radial-gradient(circle at 35% 35%, #ff6e6e, #c0392b); }
  .led.y { background: radial-gradient(circle at 35% 35%, #ffe066, #d4a017); }
  .led.g { background: radial-gradient(circle at 35% 35%, #80ff80, #2e8b2e); }

  .screen {
    background: var(--screen-darkest);
    border-radius: 8px;
    padding: 10px;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
    border: 2px solid #1a1d2a;
  }
  .screen-inner {
    background: var(--screen);
    border-radius: 4px;
    padding: 14px 12px;
    min-height: 320px;
    font-family: 'DotGothic16', monospace;
    color: var(--screen-darkest);
    position: relative;
    overflow: hidden;
  }
  .screen-inner::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
  }

  .search-row { display: flex; gap: 8px; margin-top: 14px; position: relative; }
  .search-input {
    flex: 1;
    background: var(--panel-2);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--muted); }

  .btn {
    background: var(--panel-2);
    border: 2px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 0 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 44px;
  }
  .btn:hover { background: #262a3e; border-color: var(--gold); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(180deg, #2c3050, #1d2030);
    border-color: var(--gold);
    color: var(--gold);
  }
  .btn.mic.recording {
    background: var(--red);
    border-color: #ff8080;
    color: #fff;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.7); }
    50% { box-shadow: 0 0 0 8px rgba(230,57,70,0); }
  }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }

  .footer-bar {
    margin-top: 14px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .speaker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; }
  .speaker span { display: block; width: 4px; height: 4px; background: rgba(0,0,0,0.5); border-radius: 50%; }
  .label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 1px;
  }

  .welcome { position: relative; z-index: 1; }
  .welcome h1 { font-family: 'Press Start 2P', monospace; font-size: 14px; margin-bottom: 10px; line-height: 1.5; }
  .welcome p { font-size: 14px; line-height: 1.6; margin-bottom: 6px; }
  .welcome .hint { margin-top: 12px; font-size: 12px; border-top: 1px dashed var(--screen-darkest); padding-top: 8px; }
  .welcome .stat { margin-top: 6px; font-size: 11px; opacity: 0.85; }

  .result { position: relative; z-index: 1; }
  .result-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    border-bottom: 2px solid var(--screen-darkest);
    padding-bottom: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .dex-no { font-family: 'Press Start 2P', monospace; font-size: 11px; }
  .name-ko { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 20px; line-height: 1.2; }
  .gen-tag {
    margin-left: auto;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: var(--screen-darkest);
    color: var(--screen);
    padding: 3px 6px;
    border-radius: 3px;
  }

  .types-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .type-chip {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 999px;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    border: 2px solid rgba(0,0,0,0.25);
  }

  .section {
    margin-top: 8px;
    background: rgba(15,56,15,0.08);
    padding: 6px 8px;
    border-radius: 4px;
    border-left: 3px solid var(--screen-darkest);
  }
  .section-title { font-family: 'Press Start 2P', monospace; font-size: 9px; margin-bottom: 6px; letter-spacing: 1px; }
  .chip-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 4px;
    color: #fff;
    border: 1px solid rgba(0,0,0,0.3);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .chip .mult { font-family: 'Press Start 2P', monospace; font-size: 8px; background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 2px; }
  .empty-line { font-size: 12px; opacity: 0.7; }

  .suggestions {
    position: absolute;
    top: 100%; left: 0; right: 0;
    z-index: 5;
    background: var(--panel);
    border: 2px solid var(--gold);
    border-radius: 6px;
    margin-top: 4px;
    max-height: 280px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .sugg-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .sugg-item:last-child { border-bottom: none; }
  .sugg-item:hover { background: var(--panel-2); }
  .sugg-name { font-weight: 700; font-size: 14px; }
  .sugg-meta { font-size: 10px; color: var(--muted); font-family: 'Press Start 2P', monospace; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    color: var(--text);
    border: 2px solid var(--gold);
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  /* 포켓몬 이미지 박스 - 도감 화면 안에 들어가는 스프라이트 */
  .poke-img-wrap {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 4px 0 12px;
    padding: 10px 8px 8px;
    background:
      repeating-linear-gradient(45deg, rgba(15,56,15,0.10) 0 2px, transparent 2px 6px),
      rgba(15,56,15,0.06);
    border: 2px solid var(--screen-darkest);
    border-radius: 4px;
    min-height: 170px;
    position: relative;
  }
  .poke-img-wrap img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
    filter: drop-shadow(2px 3px 0 rgba(15,56,15,0.4));
    transition: opacity 0.2s;
  }
  .poke-img-wrap img.loading { opacity: 0.3; }
  .poke-img-wrap .img-fallback {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--screen-darkest);
    opacity: 0.6;
    letter-spacing: 1px;
  }
  /* 이미지 박스 안에 들어가는 타입 행 */
  .poke-img-wrap .types-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0;
    padding-top: 4px;
    width: 100%;
  }
  .poke-img-wrap .types-row .type-chip {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 4px;
    color: #fff;
    border: 1px solid rgba(0,0,0,0.3);
    text-shadow: none;
    display: inline-flex;
    align-items: center;
  }
  /* 검색 제안 항목의 작은 썸네일 */
  .sugg-item { gap: 10px; }
  .sugg-thumb {
    width: 36px; height: 36px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .sugg-thumb img {
    width: 36px; height: 36px;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
  }
  .sugg-text { flex: 1; min-width: 0; display: flex; justify-content: space-between; align-items: center; gap: 8px; }

  .t-노말{background:#a8a878;}.t-불꽃{background:#f08030;}.t-물{background:#6890f0;}
  .t-풀{background:#78c850;}.t-전기{background:#f8d030;color:#3a2a00;text-shadow:none;}
  .t-얼음{background:#98d8d8;color:#0a3a3a;text-shadow:none;}.t-격투{background:#c03028;}
  .t-독{background:#a040a0;}.t-땅{background:#e0c068;color:#3a2a00;text-shadow:none;}
  .t-비행{background:#a890f0;}.t-에스퍼{background:#f85888;}.t-벌레{background:#a8b820;}
  .t-바위{background:#b8a038;}.t-고스트{background:#705898;}.t-드래곤{background:#7038f8;}
  .t-악{background:#705848;}.t-강철{background:#b8b8d0;color:#1a1a2a;text-shadow:none;}
  .t-페어리{background:#ee99ac;color:#3a1a20;text-shadow:none;}

  @media (max-width: 360px) {
    .name-ko { font-size: 17px; }
    .welcome h1 { font-size: 12px; }
    .btn { font-size: 10px; padding: 0 10px; }
  }
</style>
</head>
<body>

<div class="device">
  <div class="header">
    <span class="label">DEX</span>
    <div class="led r"></div>
    <div class="led y"></div>
    <div class="led g"></div>
  </div>

  <div class="screen">
    <div class="screen-inner" id="display">
      <div class="welcome">
        <h1>POKEDEX</h1>
        <p>한국어 이름 또는</p>
        <p>도감번호로 검색하세요.</p>
        <p class="hint">예: 피카츄, 25, 메가리자몽X<br>타입 입력 시 상성표 (예: 비행)</p>
        <p class="stat" id="stat-line">데이터 로딩 중...</p>
      </div>
    </div>
  </div>

  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="이름 또는 도감번호" autocomplete="off">
    <div class="suggestions" id="suggestions" style="display:none;"></div>
  </div>

  <div class="controls">
    <button class="btn primary" id="searchBtn">▶ 검색</button>
    <button class="btn mic" id="micBtn">🎤 음성</button>
  </div>

  <div class="footer-bar">
    <span class="label">SOUND</span>
    <div class="speaker">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <button id="debugBtn" style="margin-left:auto;padding:4px 8px;font-size:10px;background:#1a3320;color:#0f0;border:1px solid #0f0;border-radius:4px;cursor:pointer;">🔍 음성정보</button>
  </div>
  <div id="debugPanel" style="display:none;margin:8px;padding:10px;background:#0a1f0a;color:#0f0;font-family:monospace;font-size:11px;border:1px solid #0f0;border-radius:4px;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===========================================================
   타입 상성 차트 (방어 입장 기준 계산용)
=========================================================== */
const TYPES = ['노말','불꽃','물','풀','전기','얼음','격투','독','땅','비행','에스퍼','벌레','바위','고스트','드래곤','악','강철','페어리'];

// 공격타입(키) → {방어타입: 배율}
const ATTACK_EFFECT = {
  '노말':   {'바위':0.5,'고스트':0,'강철':0.5},
  '불꽃':   {'불꽃':0.5,'물':0.5,'풀':2,'얼음':2,'벌레':2,'바위':0.5,'드래곤':0.5,'강철':2},
  '물':     {'불꽃':2,'물':0.5,'풀':0.5,'땅':2,'바위':2,'드래곤':0.5},
  '전기':   {'물':2,'전기':0.5,'풀':0.5,'땅':0,'비행':2,'드래곤':0.5},
  '풀':     {'불꽃':0.5,'물':2,'풀':0.5,'독':0.5,'땅':2,'비행':0.5,'벌레':0.5,'바위':2,'드래곤':0.5,'강철':0.5},
  '얼음':   {'불꽃':0.5,'물':0.5,'풀':2,'얼음':0.5,'땅':2,'비행':2,'드래곤':2,'강철':0.5},
  '격투':   {'노말':2,'얼음':2,'독':0.5,'비행':0.5,'에스퍼':0.5,'벌레':0.5,'바위':2,'고스트':0,'악':2,'강철':2,'페어리':0.5},
  '독':     {'풀':2,'독':0.5,'땅':0.5,'바위':0.5,'고스트':0.5,'강철':0,'페어리':2},
  '땅':     {'불꽃':2,'전기':2,'풀':0.5,'독':2,'비행':0,'벌레':0.5,'바위':2,'강철':2},
  '비행':   {'전기':0.5,'풀':2,'격투':2,'벌레':2,'바위':0.5,'강철':0.5},
  '에스퍼': {'격투':2,'독':2,'에스퍼':0.5,'악':0,'강철':0.5},
  '벌레':   {'불꽃':0.5,'풀':2,'격투':0.5,'독':0.5,'비행':0.5,'에스퍼':2,'고스트':0.5,'악':2,'강철':0.5,'페어리':0.5},
  '바위':   {'불꽃':2,'얼음':2,'격투':0.5,'땅':0.5,'비행':2,'벌레':2,'강철':0.5},
  '고스트': {'노말':0,'에스퍼':2,'고스트':2,'악':0.5},
  '드래곤': {'드래곤':2,'강철':0.5,'페어리':0},
  '악':     {'격투':0.5,'에스퍼':2,'고스트':2,'악':0.5,'페어리':0.5},
  '강철':   {'불꽃':0.5,'물':0.5,'전기':0.5,'얼음':2,'바위':2,'강철':0.5,'페어리':2},
  '페어리': {'불꽃':0.5,'격투':2,'독':0.5,'드래곤':2,'악':2,'강철':0.5}
};

function defenseMult(defType, atkType) {
  const eff = ATTACK_EFFECT[atkType];
  if (!eff) return 1;
  return (defType in eff) ? eff[defType] : 1;
}

function computeMatchups(types) {
  const result = {};
  for (const atk of TYPES) {
    let m = 1;
    for (const def of types) m *= defenseMult(def, atk);
    result[atk] = m;
  }
  return result;
}

/* ===========================================================
   포켓몬 데이터
   [도감번호, 한국어이름, [타입들], 세대, 폼식별자]
=========================================================== */
const POKEMON = [
  // ===== 1세대 (Kanto) 0001-0151 =====
  [1,"이상해씨",["풀","독"],1,null],
  [2,"이상해풀",["풀","독"],1,null],
  [3,"이상해꽃",["풀","독"],1,null],
  [3,"메가이상해꽃",["풀","독"],1,"mega"],
  [4,"파이리",["불꽃"],1,null],
  [5,"리자드",["불꽃"],1,null],
  [6,"리자몽",["불꽃","비행"],1,null],
  [6,"메가리자몽X",["불꽃","드래곤"],1,"mega"],
  [6,"메가리자몽Y",["불꽃","비행"],1,"mega"],
  [7,"꼬부기",["물"],1,null],
  [8,"어니부기",["물"],1,null],
  [9,"거북왕",["물"],1,null],
  [9,"메가거북왕",["물"],1,"mega"],
  [10,"캐터피",["벌레"],1,null],
  [11,"단데기",["벌레"],1,null],
  [12,"버터플",["벌레","비행"],1,null],
  [13,"뿔충이",["벌레","독"],1,null],

/* 검색용 정규화 */
function normalize(s) {
  return String(s).replace(/\s+/g,'').replace(/[♀♂\.\-_·()/\[\]]/g,'').toLowerCase();
}

const POKE_INDEX = POKEMON.map(p => ({
  no: p[0], name: p[1], types: p[2], gen: p[3], form: p[4],
  norm: normalize(p[1])
}));

/* ===========================================================
   검색
=========================================================== */
function findPokemon(query) {
  if (!query) return null;
  const q = String(query).trim();

  // 도감번호로 검색 - 기본 폼(form=null) 우선
  if (/^\d+$/.test(q)) {
    const no = parseInt(q, 10);
    const matches = POKE_INDEX.filter(p => p.no === no);
    if (matches.length === 0) return null;
    const base = matches.find(p => p.form === null);
    return base || matches[0];
  }

  const nq = normalize(q);
  if (!nq) return null;

  let exact = POKE_INDEX.find(p => p.norm === nq);
  if (exact) return exact;
  let starts = POKE_INDEX.find(p => p.norm.startsWith(nq));
  if (starts) return starts;
  let contains = POKE_INDEX.find(p => p.norm.includes(nq));
  return contains || null;
}

function findSuggestions(query, limit = 10) {
  if (!query) return [];
  const q = String(query).trim();
  if (/^\d+$/.test(q)) {
    const no = parseInt(q, 10);
    const sameNo = POKE_INDEX.filter(p => p.no === no);
    if (sameNo.length > 0) return sameNo.slice(0, limit);
    return POKE_INDEX.filter(p => String(p.no).startsWith(String(no))).slice(0, limit);
  }
  const nq = normalize(q);
  if (!nq) return [];

  // 타입 매칭 - 자동완성 최상단에 표시
  const typeMatches = TYPES
    .filter(t => normalize(t).startsWith(nq) || normalize(t + '타입').startsWith(nq))
    .map(t => ({ no: null, name: `${t} 타입`, types: [t], gen: '상성', form: null, isType: true, type: t }));

  const starts = POKE_INDEX.filter(p => p.norm.startsWith(nq));
  const contains = POKE_INDEX.filter(p => !p.norm.startsWith(nq) && p.norm.includes(nq));
  return [...typeMatches, ...starts, ...contains].slice(0, limit);
}

// 이미지 폴백 체인을 시도하는 함수
function attachImageFallback(img, no) {
  let mirrorIdx = 0;
  img.addEventListener('error', function handler() {
    mirrorIdx++;
    if (mirrorIdx < ARTWORK_MIRRORS.length) {
      img.src = ARTWORK_MIRRORS[mirrorIdx] + no + '.png';
    } else {
      img.removeEventListener('error', handler);
      img.style.display = 'none';
      if (img.parentNode) {
        img.parentNode.insertAdjacentHTML('beforeend',
          '<span class="img-fallback">NO IMAGE</span>');
      }
    }
  });
}

function findFormSlug(name) {
  // X/Y로 끝나는 메가 우선
  if (name.startsWith('메가')) {
    if (name.endsWith('X')) return '-mega-x';
    if (name.endsWith('Y')) return '-mega-y';
    return '-mega';
  }
  // 괄호 안 키워드
  const match = name.match(/\(([^)]+)\)/);
  if (match) {
    const inner = match[1];
    for (const rule of FORM_SLUG_MAP) {
      if (rule.paren && rule.paren === inner) return rule.slug;
    }
  }
  return null;
}

// 같은 species API 결과 캐시 (도감번호별)
const speciesCache = new Map();

async function fetchSpeciesVarieties(no) {
  if (speciesCache.has(no)) return speciesCache.get(no);
  try {
    const res = await fetch(SPECIES_API + no + '/');
    if (!res.ok) throw new Error('species fetch failed');
    const data = await res.json();
    const varieties = data.varieties || [];
    speciesCache.set(no, varieties);
    return varieties;
  } catch (e) {
    speciesCache.set(no, []);
    return [];
  }
}

async function loadFormArtwork(p, imgId) {
  const slug = findFormSlug(p.name);
  if (!slug) return; // 매핑 없으면 본체 이미지 유지

  const varieties = await fetchSpeciesVarieties(p.no);
  if (!varieties.length) return;

  // 변형 목록에서 슬러그가 일치하는 항목 찾기
  // varieties[i].pokemon.name 예: "charizard-mega-x", url에서 ID 추출
  const target = varieties.find(v => v.pokemon && v.pokemon.name && v.pokemon.name.endsWith(slug));
  if (!target) return;

  // URL 끝에서 ID 추출: .../pokemon/10034/
  const idMatch = target.pokemon.url.match(/\/pokemon\/(\d+)\/?$/);
  if (!idMatch) return;
  const formId = idMatch[1];
  const formImgUrl = ARTWORK_BASE + formId + '.png';

  const img = document.getElementById(imgId);
  if (!img) return; // 이미 다른 결과로 넘어갔으면 무시

  // 새 이미지 사전 로드 후 교체 (실패 시 본체 유지)
  const test = new Image();
  test.onload = () => {
    if (document.getElementById(imgId) === img) img.src = formImgUrl;
  };
  test.onerror = () => { /* 본체 이미지 유지 */ };
  test.src = formImgUrl;
}

function renderResult(p) {
  const m = computeMatchups(p.types);
  const buckets = {x4:[], x2:[], xHalf:[], xQuarter:[], x0:[]};
  for (const [t, v] of Object.entries(m)) {
    if (v === 4) buckets.x4.push(t);
    else if (v === 2) buckets.x2.push(t);
    else if (v === 0.5) buckets.xHalf.push(t);
    else if (v === 0.25) buckets.xQuarter.push(t);
    else if (v === 0) buckets.x0.push(t);
  }

  const typeChips = p.types.map(t => `<span class="type-chip t-${esc(t)}">${esc(t)}</span>`).join('');
  const dexNo = String(p.no).padStart(4, '0');

  const renderChips = (arr, mult) => {
    if (arr.length === 0) return '<span class="empty-line">없음</span>';
    return arr.map(t => `<span class="chip t-${esc(t)}">${esc(t)}<span class="mult">${esc(mult)}</span></span>`).join('');
  };

  // 이미지: 즉시 본체로 표시한 뒤 폼이면 정확한 폼 이미지로 비동기 교체
  const baseImgUrl = ARTWORK_BASE + p.no + '.png';
  const imgId = 'poke-img-' + Date.now();

  display.innerHTML = `
    <div class="result">
      <div class="result-head">
        <span class="dex-no">No.${esc(dexNo)}</span>
        <span class="name-ko">${esc(p.name)}</span>
        <span class="gen-tag">GEN ${esc(p.gen)}</span>
      </div>
      <div class="poke-img-wrap">
        <img id="${esc(imgId)}" src="${esc(baseImgUrl)}" alt="${esc(p.name)}">
        <div class="types-row">${typeChips}</div>
      </div>
      ${buckets.x4.length ? `<div class="section"><div class="section-title">▼ 4배 약점</div><div class="chip-list">${renderChips(buckets.x4,'x4')}</div></div>` : ''}
      <div class="section"><div class="section-title">▼ 2배 약점</div><div class="chip-list">${renderChips(buckets.x2,'x2')}</div></div>
      <div class="section"><div class="section-title">▲ 0.5배 내성</div><div class="chip-list">${renderChips(buckets.xHalf,'½')}</div></div>
      ${buckets.xQuarter.length ? `<div class="section"><div class="section-title">▲ 0.25배 내성</div><div class="chip-list">${renderChips(buckets.xQuarter,'¼')}</div></div>` : ''}
      ${buckets.x0.length ? `<div class="section"><div class="section-title">● 무효 (0배)</div><div class="chip-list">${renderChips(buckets.x0,'0')}</div></div>` : ''}
    </div>
  `;

  // 폼 변형이면 정확한 이미지로 교체 시도
  if (p.form) {
    loadFormArtwork(p, imgId);
  } else {
    // 본체 이미지에 폴백 체인 부착
    const img = document.getElementById(imgId);
    if (img) attachImageFallback(img, p.no);
  }

  speakResult(p, buckets);
}

/* ===========================================================
   타입 정보 렌더링 (타입 단독 검색)
=========================================================== */
function renderTypeInfo(type) {
  // 공격 시 - 이 타입으로 공격할 때 효과
  const atkEff = ATTACK_EFFECT[type] || {};
  const atkSuper = [];   // 2배 (효과 굉장함)
  const atkNotVery = []; // 0.5배 (효과 별로)
  const atkNo = [];      // 0배 (효과 없음)
  for (const t of TYPES) {
    const v = (t in atkEff) ? atkEff[t] : 1;
    if (v === 2) atkSuper.push(t);
    else if (v === 0.5) atkNotVery.push(t);
    else if (v === 0) atkNo.push(t);
  }

  // 방어 시 - 이 타입이 받을 때 효과
  const defWeak = [];    // 2배 받음 (약점)
  const defResist = [];  // 0.5배 받음 (내성)
  const defImmune = [];  // 0배 받음 (무효)
  for (const atk of TYPES) {
    const eff = ATTACK_EFFECT[atk] || {};
    const v = (type in eff) ? eff[type] : 1;
    if (v === 2) defWeak.push(atk);
    else if (v === 0.5) defResist.push(atk);
    else if (v === 0) defImmune.push(atk);
  }

  const renderChips = (arr, mult) => {
    if (arr.length === 0) return '<span class="empty-line">없음</span>';
    return arr.map(t => `<span class="chip t-${esc(t)}">${esc(t)}<span class="mult">${esc(mult)}</span></span>`).join('');
  };

  display.innerHTML = `
    <div class="result">
      <div class="result-head">
        <span class="dex-no">TYPE</span>
        <span class="name-ko">${esc(type)} 타입</span>
        <span class="gen-tag">상성표</span>
      </div>
      <div class="types-row"><span class="type-chip t-${esc(type)}">${esc(type)}</span></div>

      <div class="section"><div class="section-title">⚔ 공격: 효과 굉장함 (x2)</div><div class="chip-list">${renderChips(atkSuper,'x2')}</div></div>
      <div class="section"><div class="section-title">⚔ 공격: 효과 별로 (½)</div><div class="chip-list">${renderChips(atkNotVery,'½')}</div></div>
      ${atkNo.length ? `<div class="section"><div class="section-title">⚔ 공격: 효과 없음 (0)</div><div class="chip-list">${renderChips(atkNo,'0')}</div></div>` : ''}

      <div class="section"><div class="section-title">🛡 방어: 약점 (x2)</div><div class="chip-list">${renderChips(defWeak,'x2')}</div></div>
      <div class="section"><div class="section-title">🛡 방어: 내성 (½)</div><div class="chip-list">${renderChips(defResist,'½')}</div></div>
      ${defImmune.length ? `<div class="section"><div class="section-title">🛡 방어: 무효 (0)</div><div class="chip-list">${renderChips(defImmune,'0')}</div></div>` : ''}
    </div>
  `;

  speakTypeInfo(type, {atkSuper, atkNotVery, atkNo, defWeak, defResist, defImmune});
}

function speakTypeInfo(type, b) {
  const segments = [`${type} 타입.`];
  if (b.atkSuper.length) {
    segments.push(`공격할 때, ${b.atkSuper[0]} 타입에게 효과가 굉장합니다.`);
    b.atkSuper.slice(1).forEach(t => segments.push(`${t} 타입에게 효과가 굉장합니다.`));
  }
  if (b.atkNotVery.length) {
    segments.push(`${b.atkNotVery[0]} 타입에게는 효과가 별로입니다.`);
    b.atkNotVery.slice(1).forEach(t => segments.push(`${t} 타입에게는 효과가 별로입니다.`));
  }
  if (b.atkNo.length) {
    segments.push(`${b.atkNo[0]} 타입에게는 효과가 없습니다.`);
    b.atkNo.slice(1).forEach(t => segments.push(`${t} 타입에게는 효과가 없습니다.`));
  }
  if (b.defWeak.length) {
    segments.push(`방어할 때, ${b.defWeak[0]} 타입에 약합니다.`);
    b.defWeak.slice(1).forEach(t => segments.push(`${t} 타입에 약합니다.`));
  }
  speak(segments);
}

/* ===========================================================
   음성 출력 (TTS)
=========================================================== */
let koVoice = null;
function pickKoreanVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  const koVoices = voices.filter(v => /ko[-_]?KR/i.test(v.lang) || /^ko/i.test(v.lang));
  if (koVoices.length === 0) return null;
  // 우선순위 (자연스러운 순):
  // 1) Yuna Premium ⭐ 최우선
  // 2) 다른 Premium 음성
  // 3) Yuna Enhanced
  // 4) 다른 Enhanced/향상된 음성
  // 5) Siri 음성
  // 6) Google 한국어
  // 7) Microsoft 한국어
  // 8) 그 외 한국어
  const priorities = [
    v => /Yuna/i.test(v.name) && /Premium/i.test(v.name),
    v => /Premium/i.test(v.name),
    v => /Yuna/i.test(v.name) && /Enhanced|향상된/i.test(v.name),
    v => /Enhanced|향상된/i.test(v.name),
    v => /Siri/i.test(v.name),
    v => /Yuna|유나/i.test(v.name),
    v => /Google/i.test(v.name),
    v => /Microsoft|Heami|SunHi|InJoon/i.test(v.name),
    v => /Sujin|수진|Minsu|민수/i.test(v.name),
    v => true,
  ];
  for (const pred of priorities) {
    const found = koVoices.find(pred);
    if (found) return found;
  }
  return koVoices[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { koVoice = pickKoreanVoice(); };
  koVoice = pickKoreanVoice();
}
// 발음 명확화: Yuna TTS가 헷갈리게 발음하는 단어들 보정
function clarifyForTTS(text) {
  return text;
}
// speak: 문자열 또는 문자열 배열을 받음
// - 문자열: 한 번에 재생
// - 배열: 각 요소를 별도 발화로 순차 재생 (타입 분리 발음 등)
// - "풀"이 포함된 세그먼트 뒤에는 0.5초 인터벌 자동 추가
function speak(input) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let segments = Array.isArray(input) ? input.filter(s => s && s.trim()) : [input];
  // "풀"이 포함된 세그먼트 뒤에 빈 발화(쉼) 추가 → 0.5초 인터벌 효과
  const expanded = [];
  segments.forEach(seg => {
    expanded.push(seg);
    if (/풀/.test(seg)) {
      // 약 0.5초 정도 길이의 무음 (공백 + 마침표를 천천히 발음)
      expanded.push({ silence: 500 });
    }
  });
  setTimeout(() => {
    expanded.forEach(item => {
      if (typeof item === 'object' && item.silence) {
        // 무음 utterance: 빈 공백을 아주 느리게 + 볼륨 0 → 약 1초 지연
        const silent = new SpeechSynthesisUtterance('   ');
        silent.lang = 'ko-KR';
        if (koVoice) silent.voice = koVoice;
        silent.rate = 0.1;
        silent.volume = 0;
        speechSynthesis.speak(silent);
      } else {
        const u = new SpeechSynthesisUtterance(clarifyForTTS(item));
        u.lang = 'ko-KR';
        if (koVoice) u.voice = koVoice;
        u.rate = 0.95;
        u.pitch = 1.0;
        u.volume = 1.0;
        speechSynthesis.speak(u);
      }
    });
  }, 50);
}

/* ===========================================================
   디버깅 모드: 음성 정보 표시
=========================================================== */
const debugBtn = document.getElementById('debugBtn');
const debugPanel = document.getElementById('debugPanel');
function buildVoiceDebugInfo() {
  if (!('speechSynthesis' in window)) return '❌ 이 브라우저는 음성 합성을 지원하지 않습니다.';
  const voices = speechSynthesis.getVoices();
  const koVoices = voices.filter(v => /ko[-_]?KR/i.test(v.lang) || /^ko/i.test(v.lang));
  const lines = [];
  lines.push('=== 현재 사용 중인 음성 ===');
  if (koVoice) {
    lines.push(`✅ 이름: ${koVoice.name}`);
    lines.push(`   언어: ${koVoice.lang}`);
    lines.push(`   로컬: ${koVoice.localService ? 'YES' : 'NO'}`);
    lines.push(`   기본: ${koVoice.default ? 'YES' : 'NO'}`);
  } else {
    lines.push('❌ 한국어 음성 없음 (시스템 기본 음성 사용)');
  }
  lines.push('');
  lines.push(`=== 사용 가능한 한국어 음성 (${koVoices.length}개) ===`);
  if (koVoices.length === 0) {
    lines.push('한국어 음성이 설치되어 있지 않습니다.');
  } else {
    koVoices.forEach((v, i) => {
      const mark = v === koVoice ? '👉 ' : '   ';
      lines.push(`${mark}${i+1}. ${v.name} (${v.lang})${v.localService ? ' [로컬]' : ' [원격]'}`);
    });
  }
  lines.push('');
  lines.push(`=== 전체 음성 수: ${voices.length}개 ===`);
  lines.push('');
  lines.push('=== 환경 정보 ===');
  lines.push(`UA: ${navigator.userAgent}`);
  return lines.join('\n');
}
if (debugBtn) {
  debugBtn.addEventListener('click', () => {
    if (debugPanel.style.display === 'none') {
      debugPanel.textContent = buildVoiceDebugInfo();
      debugPanel.style.display = 'block';
    } else {
      debugPanel.style.display = 'none';
    }
  });
}
// 음성 목록은 비동기로 로드되므로 패널이 열려있으면 갱신
if ('speechSynthesis' in window) {
  const originalOnVoicesChanged = speechSynthesis.onvoiceschanged;
  speechSynthesis.onvoiceschanged = () => {
    koVoice = pickKoreanVoice();
    if (debugPanel && debugPanel.style.display !== 'none') {
      debugPanel.textContent = buildVoiceDebugInfo();
    }
  };
}
function speakResult(p, buckets) {
  // 각 "타입"은 별도 발화로 분리 재생 → 자음이 명확하게 발음됨
  // 안내 문장(약점/효과없음 등)은 자연스럽게 한 줄로
  const segments = [];
  // 이름 + 타입
  if (p.types.length === 1) {
    segments.push(`${p.name}, ${p.types[0]} 타입.`);
  } else {
    segments.push(`${p.name}.`);
    segments.push(`${p.types[0]}.`);
    segments.push(`${p.types[1]} 타입.`);
  }
  // 타입 변환 특성을 가진 포켓몬 안내 (변환자재 / 리베로)
  const TYPE_CHANGERS = ['개굴닌자', '에이스번'];
  if (TYPE_CHANGERS.includes(p.name)) {
    segments.push('타입을 바꿀 수 있습니다.');
  }
  // 약점/효과없음 - 안내 문장과 첫 타입은 같이, 나머지 타입은 분리
  if (buckets.x4.length) {
    segments.push(`4배 약점, ${buckets.x4[0]}.`);
    buckets.x4.slice(1).forEach(t => segments.push(`${t}.`));
  }
  if (buckets.x2.length) {
    segments.push(`2배 약점, ${buckets.x2[0]}.`);
    buckets.x2.slice(1).forEach(t => segments.push(`${t}.`));
  }
  if (buckets.x0.length) {
    segments.push(`${buckets.x0[0]} 타입은 효과가 없습니다.`);
    buckets.x0.slice(1).forEach(t => segments.push(`${t} 타입은 효과가 없습니다.`));
  }
  speak(segments);
}

/* ===========================================================
   음성 입력 (Web Speech API)
=========================================================== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognizing = false;
const micBtn = document.getElementById('micBtn');
const searchInput = document.getElementById('searchInput');

if (SR) {
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;
  let pendingQuery = null;
  recognition.onstart = () => {
    recognizing = true;
    pendingQuery = null;
    micBtn.classList.add('recording');
    micBtn.innerHTML = '● REC';
    showToast('말씀해주세요...');
  };
  recognition.onend = () => {
    recognizing = false;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '🎤 음성';
    // 마이크가 완전히 해제된 뒤 검색 실행 (iOS Safari TTS 충돌 방지)
    if (pendingQuery) {
      const q = pendingQuery;
      pendingQuery = null;
      setTimeout(() => handleSearch(q), 150);
    }
  };
  recognition.onerror = (e) => {
    recognizing = false;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '🎤 음성';
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      showToast('마이크 권한이 필요합니다. Safari/Chrome에서 열어주세요');
    } else if (e.error === 'no-speech') {
      showToast('음성이 감지되지 않았습니다');
    } else if (e.error === 'network') {
      showToast('네트워크 오류 - 음성 인식은 인터넷 필요');
    } else {
      showToast('음성 인식 오류: ' + e.error);
    }
  };
  recognition.onresult = (event) => {
    const alts = [];
    for (let i = 0; i < event.results[0].length; i++) {
      alts.push(event.results[0][i].transcript);
    }
    let chosen = alts[0];
    // 후보 중 타입이나 포켓몬과 매칭되는 첫 번째 사용
    for (const a of alts) {
      const cleaned = a.replace(/[^\w가-힣\d]/g,'').trim();
      const noTypeSuffix = cleaned.replace(/타입$/,'').trim();
      if (TYPES.includes(noTypeSuffix) || findPokemon(cleaned)) {
        chosen = cleaned;
        break;
      }
    }
    const cleaned = chosen.replace(/[^\w가-힣\d]/g,'').trim();
    searchInput.value = cleaned;
    // onend에서 실행하도록 보류 (TTS 안정성 향상)
    pendingQuery = cleaned;
  };
  micBtn.addEventListener('click', () => {
    if (recognizing) { recognition.stop(); return; }
    // iOS Safari: 사용자 제스처 안에서 TTS 엔진을 깨워둠 (이후 자동 호출 가능하게)
    if ('speechSynthesis' in window) {
      try {
        const warmup = new SpeechSynthesisUtterance('');
        warmup.volume = 0;
        speechSynthesis.speak(warmup);
      } catch (e) {}
    }
    try { recognition.start(); }
    catch (e) { showToast('마이크를 사용할 수 없습니다.'); }
  });
} else {
  micBtn.addEventListener('click', () => {
    showToast('이 브라우저는 음성 입력을 지원하지 않습니다.');
  });
}

/* ===========================================================
   UI 이벤트
=========================================================== */
const searchBtn = document.getElementById('searchBtn');
const suggestions = document.getElementById('suggestions');

function handleSearch(q) {
  const query = (q ?? searchInput.value).trim();
  hideSuggestions();
  if (!query) return;

  // 타입 이름인지 먼저 확인
  const cleanedType = query.replace(/타입$/,'').trim();
  if (TYPES.includes(cleanedType)) {
    renderTypeInfo(cleanedType);
    return;
  }

  const p = findPokemon(query);
  if (p) renderResult(p);
  else renderNotFound(query);
}

function showSuggestions(list) {
  if (list.length === 0) { hideSuggestions(); return; }
  suggestions.innerHTML = list.map((p, idx) => {
    if (p.isType) {
      return `
        <div class="sugg-item" data-type="${esc(p.type)}">
          <span class="sugg-thumb"></span>
          <span class="sugg-text">
            <span class="sugg-name">${esc(p.name)}</span>
            <span class="sugg-meta">상성표</span>
          </span>
        </div>
      `;
    }
    return `
      <div class="sugg-item" data-name="${esc(p.name)}">
        <span class="sugg-thumb"><img loading="lazy" src="${esc(ARTWORK_BASE + p.no + '.png')}" alt="" data-thumb="1"></span>
        <span class="sugg-text">
          <span class="sugg-name">${esc(p.name)}</span>
          <span class="sugg-meta">No.${esc(String(p.no).padStart(4,'0'))} · GEN${esc(p.gen)}</span>
        </span>
      </div>
    `;
  }).join('');
  suggestions.style.display = 'block';
  // 썸네일 에러 핸들러 부착 (인라인 onerror 대신, CSP 호환)
  suggestions.querySelectorAll('img[data-thumb="1"]').forEach(img => {
    img.addEventListener('error', () => { img.style.display = 'none'; });
  });
  suggestions.querySelectorAll('.sugg-item').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      // 타입 항목
      if (el.dataset.type) {
        searchInput.value = el.dataset.type;
        hideSuggestions();
        renderTypeInfo(el.dataset.type);
        return;
      }
      // 포켓몬 항목 - 이름으로 직접 매칭 (폼별 정확한 식별을 위해)
      const name = el.dataset.name;
      const p = POKE_INDEX.find(x => x.name === name);
      if (p) {
        searchInput.value = p.name;
        hideSuggestions();
        renderResult(p);
      }
    });
  });
}
function hideSuggestions() { suggestions.style.display = 'none'; }

searchInput.addEventListener('input', () => {
  const v = searchInput.value.trim();
  if (v.length === 0) { hideSuggestions(); return; }
  showSuggestions(findSuggestions(v, 10));
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); handleSearch(); }
  if (e.key === 'Escape') { hideSuggestions(); }
});
searchInput.addEventListener('blur', () => { setTimeout(hideSuggestions, 200); });
searchBtn.addEventListener('click', () => handleSearch());

/* ===========================================================
   토스트
=========================================================== */
const toast = document.getElementById('toast');
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* 통계 표시 */
const baseCount = POKEMON.filter(p => p[4] === null).length;
const formCount = POKEMON.length - baseCount;
const statLine = document.getElementById('stat-line');
if (statLine) statLine.textContent = `수록: 본체 ${baseCount}마리 + 폼변형 ${formCount}개`;
</script>
